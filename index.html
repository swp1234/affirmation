  <script>
    function shareApp() {
      const url = window.location.href;
      if (navigator.share) {
        navigator.share({ title: document.title, url }).catch(() => {});
      } else {
        navigator.clipboard.writeText(url).then(() => {
          alert(window.i18n && window.i18n.t ? window.i18n.t('share.copiedSuccess') : 'Link copied!');
        }).catch(() => { prompt('Copy:', url); });
      }
    }
    function shareTwitter() {
      window.open('https://twitter.com/intent/tweet?url=' + encodeURIComponent(window.location.href) + '&text=' + encodeURIComponent(document.title + ' - DopaBrain'), '_blank');
    }
  </script>
